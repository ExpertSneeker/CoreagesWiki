# HTTP 自动跳转 HTTPS
server {
    listen 80;
    server_name wiki.coreages.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name wiki.coreages.com;

    ssl_certificate     /etc/letsencrypt/live/coreages.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coreages.com-0001/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # VitePress 构建产物目录，请根据实际路径修改
    root "/Volumes/Magnus's 980Pro/YGZX/CoreagesWiki/.vitepress/dist";
    index index.html;

    # VitePress 使用 HTML5 History 模式路由
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # 静态资源缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 图片缓存
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # gzip 压缩
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
